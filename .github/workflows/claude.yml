name: Claude PR Review

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write        # ← ADD THIS (fixes the OIDC error)

on:
  issue_comment:
    types: [ created ]
  pull_request_review_comment:
    types: [ created ]
  pull_request:
    types: [ opened, synchronize, reopened ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ← ADD THIS (fixes Node.js warning)

jobs:
  claude-review:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Please review this pull request. Focus on:
            - Bugs and logic errors
            - Security vulnerabilities
            - Code quality and best practices
            - Performance issues
            Post your findings as inline comments on the specific lines.